site_name: ML Theses
site_description: A guide to doing a master's thesis in applied machine learning, plus a directory of supervised theses — by Alex Jung, Aalto University.
site_url: https://ml-theses.org
site_author: Alex Jung

repo_url: https://github.com/alexjungaalto/masterthesis
repo_name: alexjungaalto/masterthesis
edit_uri: edit/main/

# Generated by build_site.sh from the repo's source-of-truth files
# (README.md, Topics.md, theses.csv). Do not edit docs/ by hand.
docs_dir: docs
site_dir: site

# Keep .html file extensions so relative links (raw <img> tags, material/*.pdf
# downloads) resolve the same way they do in the GitHub repo.
use_directory_urls: false

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Thesis Guide: index.md
  - Available Topics: Topics.md
  - Supervised Theses: theses.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  # Hide the "Made with Material for MkDocs" generator attribution.
  generator: false

copyright: Copyright &copy; Alex Jung, Aalto University
