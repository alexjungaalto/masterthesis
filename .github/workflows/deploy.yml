name: Build and deploy ml-theses.org

# Build the MkDocs site and rsync it to the Hetzner server on every push to
# main. Pull requests build only (no deploy) so broken links fail CI early.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ml-theses
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install site dependencies
        run: pip install -r requirements-docs.txt

      - name: Build site (strict — fails on broken links)
        run: ./build_site.sh

      - name: Deploy to Hetzner via rsync
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            site/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"
